services:
  cantaloupe:
    image: islandora/cantaloupe:6.3.12
    restart: always
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '1.5'
        reservations:
          memory: 1G
    env_file:
      - .env
    environment:
      CANTALOUPE_ENDPOINT_ADMIN_ENABLED: "false"
      CANTALOUPE_SOURCE_STATIC: S3Source
      CANTALOUPE_S3SOURCE_LOOKUP_STRATEGY: BasicLookupStrategy
      CANTALOUPE_CACHE_SERVER_DERIVATIVE_ENABLED: "true"
      CANTALOUPE_CACHE_SERVER_DERIVATIVE: FilesystemCache
      # Set to CloudFront domain when using CDN, so info.json @id points to the CDN
      # CANTALOUPE_BASE_URI: "https://your-cloudfront-domain.example.com"
      CANTALOUPE_HEAP_MIN: "512m"
      CANTALOUPE_HEAP_MAX: "1536m"
    ports:
      - "127.0.0.1:8182:8182"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8182/ -o /dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    labels:
      traefik.enable: true
      traefik.docker.network: traefik-network
      traefik.http.routers.cantaloupe.rule: Host(`${CANTALOUPE_DOMAIN}`)
      traefik.http.routers.cantaloupe.entrypoints: websecure
      traefik.http.routers.cantaloupe.tls.certresolver: myresolver
    volumes:
      - cantaloupe_cache:/data
    networks:
      - traefik-network

volumes:
  cantaloupe_cache:

networks:
  traefik-network:
    external: true
